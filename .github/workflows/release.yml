name: Build and Release Electron App

on:
  push:
    branches:
      - main
    paths:
      - 'electron-app/**'
      - '.github/workflows/release.yml'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd electron-app
          npm ci

      - name: Get version from package.json
        id: package-version
        run: |
          cd electron-app
          $version = node -p "require('./package.json').version"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Check if release exists
        id: check-release
        run: |
          $version = "${{ steps.package-version.outputs.version }}"
          $headers = @{
            Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
            Accept = "application/vnd.github+json"
          }
          try {
            $response = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/v$version" -Headers $headers -ErrorAction Stop
            echo "exists=true" >> $env:GITHUB_OUTPUT
            echo "Release v$version already exists, skipping build"
          } catch {
            echo "exists=false" >> $env:GITHUB_OUTPUT
            echo "Release v$version does not exist, will create"
          }

      - name: Build Electron app
        if: steps.check-release.outputs.exists == 'false'
        run: |
          cd electron-app
          npm run build
          npx electron-builder --win nsis --config
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release and Upload Assets
        if: steps.check-release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.package-version.outputs.version }}
          name: Version ${{ steps.package-version.outputs.version }}
          body: |
            ## 🚀 What's New in v${{ steps.package-version.outputs.version }}
            
            Auto-generated release from latest commit.
            
            ### 📦 Download:
            - **AppLauncher-Setup.exe** - Recommended (supports auto-update)
            - **AppLauncher-Portable.exe** - Portable version
            
            ### 📝 Changes:
            ${{ github.event.head_commit.message }}
            
            ---
            
            **For existing users:** Your app will auto-update when you restart it.
            **For new users:** Download and run AppLauncher-Setup.exe
          files: |
            electron-app/dist/AppLauncher-Setup.exe
            electron-app/dist/AppLauncher-Portable.exe
            electron-app/dist/latest.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Complete
        if: steps.check-release.outputs.exists == 'false'
        run: |
          echo "✅ Release v${{ steps.package-version.outputs.version }} created successfully!"
          echo "🔗 View release: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.package-version.outputs.version }}"
