<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConneQtion Launcher</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      overflow-x: hidden;
    }

    /* ══════════════════════════════════════
       DARK SCENE with vivid colour orbs
       — this is what the glass refracts
       ══════════════════════════════════════ */
    body {
      background: #0c0c14;
      position: relative;
      min-height: 100vh;
    }

    /* Fixed gradient layer */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 65% 55% at 12% 18%,  #7c3aed 0%, transparent 58%),
        radial-gradient(ellipse 50% 60% at 85% 12%,  #0ea5e9 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 75% 82%,  #ec4899 0%, transparent 52%),
        radial-gradient(ellipse 45% 50% at 18% 80%,  #10b981 0%, transparent 50%),
        radial-gradient(ellipse 35% 35% at 50% 48%,  #f59e0b 0%, transparent 55%),
        #0c0c14;
    }

    /* Animated soft orbs floating */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(72px); pointer-events: none; z-index: 0;
      mix-blend-mode: screen;
    }
    .o1 { width: 580px; height: 580px; background: #7c3aed; opacity: .55; top: -160px; left: -120px; animation: f1 26s ease-in-out infinite; }
    .o2 { width: 480px; height: 480px; background: #0ea5e9; opacity: .50; top: -40px; right: -80px; animation: f2 32s ease-in-out infinite; }
    .o3 { width: 420px; height: 420px; background: #ec4899; opacity: .50; bottom: -80px; right: 5%;  animation: f3 22s ease-in-out infinite; }
    .o4 { width: 380px; height: 380px; background: #10b981; opacity: .45; bottom: -60px; left: 8%;  animation: f4 28s ease-in-out infinite; }
    .o5 { width: 280px; height: 280px; background: #f59e0b; opacity: .40; top: 42%; left: 42%;      animation: f5 19s ease-in-out infinite; }

    @keyframes f1 { 0%,100%{transform:translate(0,0) scale(1)}   40%{transform:translate(70px,90px) scale(1.1)}  70%{transform:translate(-30px,40px) scale(.93)} }
    @keyframes f2 { 0%,100%{transform:translate(0,0) scale(1)}   35%{transform:translate(-80px,65px) scale(1.08)} 65%{transform:translate(40px,-35px) scale(.92)} }
    @keyframes f3 { 0%,100%{transform:translate(0,0) scale(1)}   50%{transform:translate(50px,-70px) scale(1.12)} }
    @keyframes f4 { 0%,100%{transform:translate(0,0) scale(1)}   45%{transform:translate(-45px,50px) scale(1.07)} }
    @keyframes f5 { 0%,100%{transform:translate(0,0) scale(1)}   50%{transform:translate(30px,-35px) scale(1.09)} }

    /* ══════════════════════════════════════
       LIQUID GLASS MATERIAL
       Clear glass — colour comes from behind
       ══════════════════════════════════════ */

    /* Card glass */
    .glass-card {
      position: relative;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(40px) saturate(2.2) brightness(1.1);
      -webkit-backdrop-filter: blur(40px) saturate(2.2) brightness(1.1);
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.20);
      box-shadow:
        0 1.5px 0 rgba(255,255,255,0.55) inset,  /* top specular rim */
        0 -1px  0 rgba(255,255,255,0.10) inset,  /* bottom rim */
        0 20px 60px rgba(0,0,0,0.40),
        0  4px 16px rgba(0,0,0,0.25);
      overflow: hidden;
      transition: border-color .35s ease, box-shadow .35s ease, transform .4s cubic-bezier(.34,1.46,.64,1);
    }
    /* Top-left specular flash */
    .glass-card::before {
      content: '';
      position: absolute; inset: 0; border-radius: inherit; z-index: 1; pointer-events: none;
      background: linear-gradient(
        148deg,
        rgba(255,255,255,0.55) 0%,
        rgba(255,255,255,0.18) 14%,
        rgba(255,255,255,0.02) 35%,
        transparent 55%
      );
    }
    /* Bottom-edge refraction bounce */
    .glass-card::after {
      content: '';
      position: absolute; inset: 0; border-radius: inherit; z-index: 1; pointer-events: none;
      background: linear-gradient(to bottom, transparent 65%, rgba(255,255,255,0.06) 82%, rgba(255,255,255,0.18) 100%);
    }
    .glass-card > * { position: relative; z-index: 2; }
    .glass-card:hover {
      border-color: rgba(255,255,255,0.32);
      box-shadow:
        0 1.5px 0 rgba(255,255,255,0.65) inset,
        0 -1px  0 rgba(255,255,255,0.14) inset,
        0 28px 80px rgba(0,0,0,0.50),
        0  6px 24px rgba(0,0,0,0.30);
      transform: translateY(-3px);
    }

    /* ══════ PILL BUTTON — the iconic Apple glass pill ══════ */
    .glass-pill {
      position: relative;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 15px 32px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.28);
      cursor: pointer; outline: none;
      font-family: inherit; font-size: 15px; font-weight: 600;
      color: rgba(255,255,255,0.92);
      letter-spacing: -.2px;
      overflow: hidden;
      /* The glass lens gradient */
      background: linear-gradient(
        155deg,
        rgba(255,255,255,0.38) 0%,
        rgba(255,255,255,0.16) 22%,
        rgba(255,255,255,0.06) 50%,
        rgba(255,255,255,0.04) 68%,
        rgba(255,255,255,0.12) 85%,
        rgba(255,255,255,0.22) 100%
      );
      backdrop-filter: blur(36px) saturate(2.4) brightness(1.15);
      -webkit-backdrop-filter: blur(36px) saturate(2.4) brightness(1.15);
      box-shadow:
        0 1.5px 0 rgba(255,255,255,0.65) inset,  /* sharp top highlight */
        0 -1px  0 rgba(255,255,255,0.18) inset,
        1px  0  0 rgba(255,255,255,0.16) inset,
        -1px 0  0 rgba(255,255,255,0.16) inset,
        0 10px 30px rgba(0,0,0,0.40),
        0  3px  8px rgba(0,0,0,0.28);
      transition: all .3s cubic-bezier(.34,1.46,.64,1);
    }
    /* Top-half gloss overlay */
    .glass-pill::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 46%;
      border-radius: 50px 50px 0 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.30) 0%, transparent 100%);
      pointer-events: none;
    }
    .glass-pill:hover:not(:disabled) {
      border-color: rgba(255,255,255,0.42);
      box-shadow:
        0 1.5px 0 rgba(255,255,255,0.80) inset,
        0 -1px  0 rgba(255,255,255,0.22) inset,
        1px  0  0 rgba(255,255,255,0.22) inset,
        -1px 0  0 rgba(255,255,255,0.22) inset,
        0 18px 50px rgba(0,0,0,0.55),
        0  5px 16px rgba(0,0,0,0.35);
      transform: translateY(-2px) scale(1.015);
    }
    .glass-pill:active:not(:disabled) {
      transform: scale(.98);
      box-shadow: 0 1px 0 rgba(255,255,255,0.50) inset, 0 6px 18px rgba(0,0,0,0.35);
    }
    .glass-pill:disabled { opacity: .45; cursor: not-allowed; }

    /* ══════ GLASS INPUT ══════ */
    .glass-input {
      width: 100%;
      padding: 15px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(30px) saturate(2);
      -webkit-backdrop-filter: blur(30px) saturate(2);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.90);
      font-family: inherit; font-size: 16px;
      outline: none;
      transition: all .25s ease;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.28) inset,
        0 4px 14px rgba(0,0,0,0.18);
    }
    .glass-input::placeholder { color: rgba(255,255,255,0.32); }
    .glass-input:focus {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.35);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.40) inset,
        0 6px 24px rgba(0,0,0,0.28),
        0 0 0 3px rgba(255,255,255,0.06);
    }

    /* ══════ LAYOUT ══════ */
    .page { position: relative; z-index: 1; min-height: 100vh; padding: 64px 20px 80px; }
    .container { max-width: 640px; margin: 0 auto; }

    /* ══════ HEADER ══════ */
    .header { text-align: center; margin-bottom: 48px; }

    .badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 20px; border-radius: 50px; margin-bottom: 22px;
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(24px) saturate(2);
      -webkit-backdrop-filter: blur(24px) saturate(2);
      border: 1px solid rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.72);
      font-size: 12px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase;
      box-shadow: 0 1px 0 rgba(255,255,255,0.40) inset;
      position: relative; overflow: hidden;
    }
    .badge::before {
      content: '';
      position: absolute; inset: 0; border-radius: 50px;
      background: linear-gradient(135deg, rgba(255,255,255,0.30) 0%, transparent 45%);
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px #4ade80; flex-shrink: 0; position: relative; z-index: 1; }

    .header h1 {
      font-size: clamp(2.4rem, 7vw, 3.8rem);
      font-weight: 700;
      color: rgba(255,255,255,0.94);
      letter-spacing: -2px; line-height: 1.08;
      text-shadow: 0 2px 40px rgba(124,58,237,0.4);
    }
    .header p { margin-top: 12px; font-size: 16px; color: rgba(255,255,255,0.45); font-weight: 400; }

    /* ══════ FORM CARD ══════ */
    .publish-card { padding: 34px 34px 28px; margin-bottom: 28px; }

    .field-label {
      display: block; font-size: 11px; font-weight: 700;
      letter-spacing: .7px; text-transform: uppercase;
      color: rgba(255,255,255,0.38); margin-bottom: 9px;
    }
    .field { margin-bottom: 14px; }

    /* ══════ ADVANCED TOGGLE ══════ */
    .adv-toggle {
      display: flex; align-items: center; gap: 7px;
      color: rgba(255,255,255,0.40); font-size: 14px; font-weight: 500;
      cursor: pointer; user-select: none; width: fit-content;
      margin-top: 4px; transition: color .2s;
    }
    .adv-toggle:hover { color: rgba(255,255,255,0.65); }
    .chevron { width: 14px; height: 14px; transition: transform .3s cubic-bezier(.34,1.56,.64,1); }
    .adv-toggle.open .chevron { transform: rotate(90deg); }

    .adv-section { max-height: 0; overflow: hidden; transition: max-height .4s cubic-bezier(.4,0,.2,1); }
    .adv-section.open { max-height: 420px; margin-top: 16px; }

    .divider { display: flex; align-items: center; gap: 10px; margin: 12px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.09); }
    .divider span { font-size: 11px; color: rgba(255,255,255,0.28); font-weight: 600; letter-spacing: .4px; }

    /* ══════ BUTTON ROW ══════ */
    .btn-row { display: flex; gap: 10px; margin-top: 20px; width: 100%; }
    .btn-row .glass-pill { flex: 1; }

    /* Ghost variant for upload */
    .glass-pill-sm {
      width: 100%; padding: 13px 20px; border-radius: 16px;
      font-size: 14px; color: rgba(255,255,255,0.65);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, 0 4px 12px rgba(0,0,0,0.20);
    }
    .glass-pill-sm:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.20); }

    /* ══════ STATUS ══════ */
    .status { margin-top: 14px; padding: 12px 16px; border-radius: 14px; font-size: 14px; font-weight: 500; display: none; animation: pop .3s cubic-bezier(.34,1.56,.64,1); }
    .status.show { display: block; }
    .status.ok  { background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.28); color: #86efac; backdrop-filter: blur(20px); }
    .status.err { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.28); color: #fca5a5; backdrop-filter: blur(20px); }

    /* ══════ FILE PREVIEW ══════ */
    .fp { display: none; align-items: center; gap: 12px; margin-top: 10px; padding: 11px 14px; border-radius: 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14); }
    .fp.show { display: flex; }
    .fp img { width: 38px; height: 38px; border-radius: 9px; object-fit: cover; }
    .fp-info { flex: 1; }
    .fp-name { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.78); margin-bottom: 1px; }
    .fp-size { font-size: 11px; color: rgba(255,255,255,0.38); }
    .fp-rm { color: rgba(255,255,255,0.28); cursor: pointer; font-size: 20px; padding: 4px 6px; border-radius: 6px; transition: color .2s; }
    .fp-rm:hover { color: #f87171; }

    /* ══════ URL CARD LIST ══════ */
    .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding: 0 4px; }
    .list-title { font-size: 11px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase; color: rgba(255,255,255,0.35); }
    .count-badge {
      font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.50);
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(16px); padding: 2px 10px; border-radius: 50px;
    }

    .urls-list { display: flex; flex-direction: column; gap: 10px; }

    .url-card { padding: 18px 22px; display: flex; align-items: center; gap: 16px; animation: pop .45s cubic-bezier(.34,1.56,.64,1); }

    /* Icon pill */
    .icon-wrap { position: relative; width: 50px; height: 50px; flex-shrink: 0; }
    .icon-wrap::before {
      content: ''; position: absolute; inset: 0; border-radius: 14px;
      background: linear-gradient(140deg, rgba(255,255,255,0.55) 0%, transparent 55%);
      z-index: 2; pointer-events: none;
    }
    .icon-wrap img {
      width: 50px; height: 50px; border-radius: 14px;
      object-fit: contain; padding: 9px;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(20px); display: block;
    }

    .url-info { flex: 1; min-width: 0; }
    .url-title { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.88); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .url-link  { font-size: 13px; color: rgba(255,255,255,0.40); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .url-date  { font-size: 11px; color: rgba(255,255,255,0.26); }

    /* ══════ PIN BUTTON ══════ */
    .btn-pin {
      flex-shrink: 0; padding: 8px 18px; border-radius: 50px;
      border: 1.5px solid rgba(251,191,36,0.25); cursor: pointer;
      font-family: inherit; font-size: 13px; font-weight: 700;
      color: rgba(255,255,255,0.70);
      background: rgba(251,191,36,0.08);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      box-shadow: 0 1px 0 rgba(255,255,255,0.12) inset, 0 4px 12px rgba(0,0,0,0.35);
      transition: all .22s cubic-bezier(.34,1.46,.64,1);
      letter-spacing: .1px;
      margin-right: 8px;
    }
    .btn-pin:hover {
      background: rgba(251,191,36,0.15);
      border-color: rgba(251,191,36,0.40);
      box-shadow: 0 1px 0 rgba(255,255,255,0.15) inset, 0 6px 18px rgba(251,191,36,0.25);
      transform: scale(1.05);
    }
    .btn-pin.pinned {
      background: rgba(251,191,36,0.25);
      border-color: rgba(251,191,36,0.50);
      color: rgba(255,255,255,0.95);
    }

    .btn-rm {
      flex-shrink: 0; padding: 8px 18px; border-radius: 50px;
      border: 1.5px solid rgba(0,0,0,0.18); cursor: pointer;
      font-family: inherit; font-size: 13px; font-weight: 700;
      color: rgba(255,255,255,0.95);
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      box-shadow: 0 1px 0 rgba(255,255,255,0.12) inset, 0 4px 12px rgba(0,0,0,0.35);
      transition: all .22s cubic-bezier(.34,1.46,.64,1);
      letter-spacing: .1px;
    }
    .btn-rm:hover {
      background: rgba(220,50,50,0.80);
      border-color: rgba(255,100,100,0.40);
      box-shadow: 0 1px 0 rgba(255,255,255,0.15) inset, 0 6px 18px rgba(180,0,0,0.40);
      transform: scale(1.05);
    }

    /* ══════ EMPTY STATE ══════ */
    .empty { padding: 56px 20px; text-align: center; }
    .empty-icon {
      width: 68px; height: 68px; margin: 0 auto 18px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.16);
      border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 30px;
      box-shadow: 0 1px 0 rgba(255,255,255,0.40) inset; position: relative; overflow: hidden;
    }
    .empty-icon::before { content: ''; position: absolute; inset: 0; border-radius: 20px; background: linear-gradient(140deg, rgba(255,255,255,0.40) 0%, transparent 50%); }
    .empty-t { font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.65); margin-bottom: 5px; }
    .empty-s { font-size: 13px; color: rgba(255,255,255,0.32); }

    @keyframes pop { from{opacity:0;transform:translateY(10px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }

    @media(max-width:600px){
      .publish-card{padding:22px 18px;}
      .url-card{padding:14px 16px;}
      .header h1{letter-spacing:-1.5px;}
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <div class="orb o4"></div>
  <div class="orb o5"></div>

  <div class="page">
    <div class="container">

      <!-- Header -->
      <div class="header">
        <div class="badge">
          <span class="badge-dot" id="serverStatus"></span>
          <span style="position:relative;z-index:1">APP LAUNCH ON</span>
        </div>
        <h1>App Launcher</h1>
        <p>Publish and manage your web apps</p>
      </div>

      <!-- Publish card -->
      <div class="glass-card publish-card">
        <div class="field">
          <span class="field-label">Custom Name (Optional)</span>
          <input class="glass-input" type="text" id="nameInput" placeholder="e.g., My Documents, Email, etc.">
        </div>
        
        <div class="field">
          <span class="field-label">Website URL</span>
          <input class="glass-input" type="text" id="urlInput" placeholder="https://youtube.com"
            onkeypress="if(event.key==='Enter') publishURL()">
        </div>

        <div class="adv-toggle" id="advToggle" onclick="toggleAdv()">
          <svg class="chevron" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="4,2 10,7 4,12"/></svg>
          Advanced Options
        </div>

        <div class="adv-section" id="advSection">
          <div class="field" style="margin-top:14px">
            <span class="field-label">Custom Icon URL</span>
            <input class="glass-input" type="text" id="iconInput" placeholder="https://example.com/icon.png">
          </div>
          <div class="divider"><span>or upload</span></div>
          <div class="field">
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile()">
            <button class="glass-pill glass-pill-sm" onclick="document.getElementById('fileInput').click()" type="button">
              📁 &nbsp;<span id="fileLabel">Choose Image</span>
            </button>
            <div class="fp" id="fp"></div>
          </div>
        </div>

        <div class="btn-row">
          <button class="glass-pill" id="pubBtn" onclick="publishURL()">🚀&nbsp; Publish</button>
        </div>

        <div class="status" id="status"></div>
      </div>

      <!-- List -->
      <div id="listWrap"></div>

    </div>
  </div>

  <script>
    // Use localhost if running locally, otherwise use Render
    const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:3000'
      : 'https://app-launcher-u0x7.onrender.com';
    
    console.log('🌐 Admin Panel loaded');
    console.log('📡 Using API:', API);
    
    let busy = false, uploadedIcon = null;

    // Keep server awake by pinging every 5 minutes
    function keepServerAwake() {
      const statusDot = document.getElementById('serverStatus');
      if (statusDot) {
        statusDot.style.background = '#fbbf24'; // yellow - checking
        statusDot.style.boxShadow = '0 0 8px #fbbf24';
      }
      
      fetch(`${API}/health`)
        .then(r => {
          console.log('✅ Server is awake');
          if (statusDot) {
            statusDot.style.background = '#4ade80'; // green - online
            statusDot.style.boxShadow = '0 0 8px #4ade80';
          }
        })
        .catch(e => {
          console.warn('⚠️ Server ping failed:', e);
          if (statusDot) {
            statusDot.style.background = '#f87171'; // red - offline
            statusDot.style.boxShadow = '0 0 8px #f87171';
          }
        });
    }
    
    // Ping immediately on load
    keepServerAwake();
    // Then ping every 5 minutes
    setInterval(keepServerAwake, 5 * 60 * 1000);

    function toggleAdv() {
      document.getElementById('advToggle').classList.toggle('open');
      document.getElementById('advSection').classList.toggle('open');
    }

    function handleFile() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) { toast('Select an image file', true); return; }
      if (file.size > 5e6) { toast('Image must be under 5MB', true); return; }
      const r = new FileReader();
      r.onload = e => {
        document.getElementById('fileLabel').textContent = 'Change Image';
        const fp = document.getElementById('fp');
        fp.innerHTML = `<img src="${e.target.result}"><div class="fp-info"><div class="fp-name">${file.name}</div><div class="fp-size">${(file.size/1024).toFixed(1)} KB</div></div><span class="fp-rm" onclick="clearFile()">×</span>`;
        fp.classList.add('show');
      };
      r.readAsDataURL(file);
      uploadFile(file);
    }

    async function uploadFile(file) {
      const fd = new FormData(); fd.append('icon', file);
      try {
        console.log('Uploading file to:', `${API}/upload-icon`);
        const r = await fetch(`${API}/upload-icon`, { method:'POST', body:fd });
        console.log('Upload response status:', r.status);
        if (!r.ok) {
          const errText = await r.text();
          console.error('Upload failed:', errText);
          throw new Error(errText || 'Upload failed');
        }
        const result = await r.json();
        console.log('Upload result:', result);
        uploadedIcon = result.iconUrl;
        toast('✓ Image uploaded');
      } catch(e) { 
        console.error('Upload error:', e);
        toast('Upload failed: ' + (e.message || 'Unknown error'), true); 
        clearFile(); 
      }
    }

    function clearFile() {
      document.getElementById('fileInput').value = '';
      document.getElementById('fp').classList.remove('show');
      document.getElementById('fileLabel').textContent = 'Choose Image';
      uploadedIcon = null;
    }

    function toast(msg, err=false) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `status show ${err?'err':'ok'}`;
      setTimeout(() => el.classList.remove('show'), 3200);
    }

    const fmt = d => new Date(d).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});

    async function fetchURLs() {
      const w = document.getElementById('listWrap');
      try {
        const urls = await (await fetch(`${API}/urls`)).json();
        if (!urls.length) {
          w.innerHTML = `<div class="glass-card empty"><div class="empty-icon">🌐</div><div class="empty-t">No apps published yet</div><div class="empty-s">Add your first URL above</div></div>`;
          return;
        }
        
        // Sort: pinned first, then by date
        urls.sort((a, b) => {
          if (a.pinned && !b.pinned) return -1;
          if (!a.pinned && b.pinned) return 1;
          return new Date(b.publishedAt) - new Date(a.publishedAt);
        });
        
        const pinnedCount = urls.filter(u => u.pinned).length;
        
        w.innerHTML = `
          <div class="list-header">
            <span class="list-title">Published Apps</span>
            <span class="count-badge">${urls.length}</span>
          </div>
          <div class="urls-list">
            ${urls.map(u => {
              const domain = extractDomainFromUrl(u.url);
              const displayTitle = u.customName || u.title;
              return `
              <div class="glass-card url-card">
                <div class="icon-wrap">
                  <img src="${u.favicon}" alt="${displayTitle}"
                    onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22%3E%3Crect width=%2240%22 height=%2240%22 rx=%228%22 fill=%22rgba(255,255,255,.1)%22/%3E%3Ctext x=%2220%22 y=%2226%22 text-anchor=%22middle%22 font-size=%2218%22%3E🌐%3C/text%3E%3C/svg%3E'">
                </div>
                <div class="url-info">
                  <div class="url-title">${displayTitle}${u.pinned ? ' 📌' : ''}</div>
                  <div class="url-link">${domain}</div>
                  <div class="url-date">${fmt(u.publishedAt)}</div>
                </div>
                <button class="btn-pin ${u.pinned ? 'pinned' : ''}" 
                  onclick="togglePin('${u.id}')"
                  ${!u.pinned && pinnedCount >= 5 ? 'disabled title="Maximum 5 pinned apps"' : ''}>
                  ${u.pinned ? '📌 Pinned' : 'Pin'}
                </button>
                <button class="btn-rm" onclick="deleteURL('${u.id}')">Remove</button>
              </div>`;
            }).join('')}
          </div>`;
      } catch {
        w.innerHTML = `<div class="glass-card empty"><div class="empty-icon">⚠️</div><div class="empty-t">Can't reach server</div><div class="empty-s">Make sure the backend is running</div></div>`;
      }
    }

    function extractDomainFromUrl(url) {
      try {
        const urlObj = new URL(url);
        return urlObj.hostname.replace('www.', '');
      } catch {
        return url;
      }
    }

    async function publishURL() {
      if (busy) {
        console.log('Already publishing, ignoring click');
        return;
      }
      const url = document.getElementById('urlInput').value.trim();
      const icon = document.getElementById('iconInput').value.trim();
      const customName = document.getElementById('nameInput').value.trim();
      
      if (!url) { toast('Please enter a URL', true); return; }
      try { new URL(url); } catch { toast('Enter a valid URL', true); return; }

      busy = true;
      const btn = document.getElementById('pubBtn');
      btn.disabled = true; 
      btn.innerHTML = '⏳&nbsp; Publishing…';
      
      console.log('Publishing URL:', url);
      console.log('Custom name:', customName);
      console.log('Custom icon URL:', icon);
      console.log('Uploaded icon:', uploadedIcon);

      // Check if server is awake first
      let serverAwake = false;
      try {
        btn.innerHTML = '🌙&nbsp; Waking server...';
        const healthCheck = await fetch(`${API}/health`, { method: 'GET' });
        serverAwake = healthCheck.ok;
        console.log('Server status:', serverAwake ? 'awake ✅' : 'sleeping 😴');
        if (serverAwake) btn.innerHTML = '⏳&nbsp; Publishing…';
      } catch(e) {
        console.error('Health check failed:', e);
      }

      // Create timeout promise (60 seconds for cold start)
      const timeoutPromise = new Promise((_, reject) => 
        setTimeout(() => reject(new Error('Timeout: Server took too long to respond. Please try again.')), 60000)
      );

      try {
        const payload = { url };
        if (customName) payload.customName = customName;
        if (uploadedIcon) payload.customIcon = uploadedIcon;
        else if (icon) payload.customIcon = icon;
        
        console.log('Sending payload:', payload);
        
        const fetchPromise = fetch(`${API}/urls`, { 
          method:'POST', 
          headers:{'Content-Type':'application/json'}, 
          body:JSON.stringify(payload) 
        });
        
        // Race between fetch and timeout
        const res = await Promise.race([fetchPromise, timeoutPromise]);
        console.log('Publish response status:', res.status);
        
        if (!res.ok) { 
          const errText = await res.text();
          console.error('Publish error response:', errText);
          let errMsg;
          try {
            const errJson = JSON.parse(errText);
            errMsg = errJson.error || 'Failed to publish';
          } catch {
            errMsg = errText || 'Failed to publish';
          }
          throw new Error(errMsg); 
        }
        
        const entry = await res.json();
        console.log('Published entry:', entry);
        
        document.getElementById('urlInput').value = '';
        document.getElementById('iconInput').value = '';
        document.getElementById('nameInput').value = '';
        clearFile();
        toast(`✓ Published: ${entry.customName || entry.title}`);
        fetchURLs();
      } catch(e) { 
        console.error('Publish error:', e);
        toast(e.message || 'Failed to publish', true); 
      }
      finally { 
        console.log('Publishing complete, resetting button');
        busy=false; 
        btn.disabled=false; 
        btn.innerHTML='🚀&nbsp; Publish'; 
      }
    }

    async function deleteURL(id) {
      try {
        if (!(await fetch(`${API}/urls/${id}`,{method:'DELETE'})).ok) throw 0;
        toast('✓ Removed');
        fetchURLs();
      } catch { toast('Failed to remove', true); }
    }

    async function togglePin(id) {
      try {
        const res = await fetch(`${API}/urls/${id}/pin`, {method:'POST'});
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Failed to pin');
        }
        const result = await res.json();
        toast(result.pinned ? '📌 Pinned' : '✓ Unpinned');
        fetchURLs();
      } catch(e) { 
        toast(e.message || 'Failed to toggle pin', true); 
      }
    }

    fetchURLs();
    setInterval(fetchURLs, 5000);
  </script>
</body>
</html>
