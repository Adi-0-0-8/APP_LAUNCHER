<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConneQtion Launcher</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      overflow-x: hidden;
    }

    body {
      background: #000;
      position: relative;
      min-height: 100vh;
    }

    /* ── Ribbon canvas (full page background) ── */
    #ribbons {
      position: fixed; inset: 0; z-index: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* ── Glass material ── */
    .glass-card {
      position: relative;
      background: rgba(40, 44, 48, 0.50);
      backdrop-filter: blur(32px) saturate(1.5);
      -webkit-backdrop-filter: blur(32px) saturate(1.5);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.18) inset,
        0 -1px 0 rgba(255,255,255,0.06) inset,
        0 24px 60px rgba(0,0,0,0.55),
        0  6px 18px rgba(0,0,0,0.35);
      overflow: hidden;
      transition: border-color .3s, box-shadow .3s, transform .3s cubic-bezier(.34,1.46,.64,1);
    }
    .glass-card::before {
      content: '';
      position: absolute; inset: 0; border-radius: inherit; z-index: 1; pointer-events: none;
      background: linear-gradient(148deg,
        rgba(255,255,255,0.14) 0%,
        rgba(255,255,255,0.04) 25%,
        transparent 50%
      );
    }
    .glass-card::after {
      content: '';
      position: absolute; inset: 0; border-radius: inherit; z-index: 1; pointer-events: none;
      background: linear-gradient(to bottom, transparent 65%, rgba(255,255,255,0.04) 85%, rgba(255,255,255,0.10) 100%);
    }
    .glass-card > * { position: relative; z-index: 2; }
    .glass-card:hover {
      border-color: rgba(0,229,204,0.25);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.22) inset,
        0 -1px 0 rgba(255,255,255,0.08) inset,
        0 32px 80px rgba(0,0,0,0.65),
        0  8px 24px rgba(0,0,0,0.40);
      transform: translateY(-2px);
    }

    /* ── Pill button ── */
    .glass-pill {
      position: relative;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 28px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.20);
      cursor: pointer; outline: none;
      font-family: inherit; font-size: 14px; font-weight: 700;
      color: rgba(255,255,255,0.90);
      letter-spacing: .3px;
      overflow: hidden;
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(30px) saturate(2);
      -webkit-backdrop-filter: blur(30px) saturate(2);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.30) inset,
        0 -1px 0 rgba(255,255,255,0.08) inset,
        0 8px 24px rgba(0,0,0,0.40),
        0 3px 8px rgba(0,0,0,0.28);
      transition: all .28s cubic-bezier(.34,1.46,.64,1);
    }
    .glass-pill::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 48%;
      border-radius: 50px 50px 0 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.20) 0%, transparent 100%);
      pointer-events: none;
    }
    .glass-pill:hover:not(:disabled) {
      background: rgba(255,255,255,0.17);
      border-color: rgba(0,229,204,0.45);
      box-shadow:
        0 1.5px 0 rgba(255,255,255,0.40) inset,
        0 -1px 0 rgba(255,255,255,0.10) inset,
        0 14px 40px rgba(0,0,0,0.55),
        0  5px 14px rgba(0,0,0,0.32);
      transform: translateY(-2px) scale(1.015);
    }
    .glass-pill:active:not(:disabled) { transform: scale(.97); }
    .glass-pill:disabled { opacity: .40; cursor: not-allowed; }

    /* ── Input ── */
    .glass-input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(24px) saturate(1.6);
      -webkit-backdrop-filter: blur(24px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.13);
      color: rgba(255,255,255,0.88);
      font-family: inherit; font-size: 15px;
      outline: none;
      transition: all .22s ease;
      box-shadow: 0 1px 0 rgba(255,255,255,0.14) inset, 0 3px 10px rgba(0,0,0,0.20);
    }
    .glass-input::placeholder { color: rgba(255,255,255,0.28); }
    .glass-input:focus {
      background: rgba(255,255,255,0.12);
      border-color: rgba(0,229,204,0.35);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.22) inset,
        0 5px 20px rgba(0,0,0,0.28),
        0 0 0 3px rgba(0,229,204,0.08);
    }

    /* ── Layout ── */
    .page { position: relative; z-index: 1; min-height: 100vh; padding: 56px 20px 72px; }
    .container { max-width: 640px; margin: 0 auto; }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 44px; }

    .badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 18px; border-radius: 50px; margin-bottom: 20px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border: 1px solid rgba(255,255,255,0.16);
      color: rgba(255,255,255,0.60);
      font-size: 11px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase;
      box-shadow: 0 1px 0 rgba(255,255,255,0.20) inset;
      position: relative; overflow: hidden;
    }
    .badge::before {
      content: '';
      position: absolute; inset: 0; border-radius: 50px;
      background: linear-gradient(135deg, rgba(255,255,255,0.14) 0%, transparent 45%);
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px #4ade80; flex-shrink: 0; position: relative; z-index: 1; }

    .header h1 {
      font-size: clamp(2.2rem, 7vw, 3.6rem);
      font-weight: 800;
      color: rgba(255,255,255,0.92);
      letter-spacing: -2px; line-height: 1.08;
    }
    .header h1 span { color: #00e5cc; }
    .header p { margin-top: 10px; font-size: 15px; color: rgba(255,255,255,0.38); font-weight: 400; }

    /* ── Publish card ── */
    .publish-card { padding: 30px 28px 24px; margin-bottom: 24px; }

    .field-label {
      display: block; font-size: 11px; font-weight: 700;
      letter-spacing: .7px; text-transform: uppercase;
      color: rgba(255,255,255,0.35); margin-bottom: 8px;
    }
    .field { margin-bottom: 13px; }

    /* ── Advanced toggle ── */
    .adv-toggle {
      display: flex; align-items: center; gap: 7px;
      color: rgba(255,255,255,0.35); font-size: 13px; font-weight: 500;
      cursor: pointer; user-select: none; width: fit-content;
      margin-top: 4px; transition: color .2s;
    }
    .adv-toggle:hover { color: rgba(0,229,204,0.70); }
    .chevron { width: 13px; height: 13px; transition: transform .3s cubic-bezier(.34,1.56,.64,1); }
    .adv-toggle.open .chevron { transform: rotate(90deg); }

    .adv-section { max-height: 0; overflow: hidden; transition: max-height .4s cubic-bezier(.4,0,.2,1); }
    .adv-section.open { max-height: 420px; margin-top: 14px; }

    .divider { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
    .divider span { font-size: 11px; color: rgba(255,255,255,0.24); font-weight: 600; letter-spacing: .4px; }

    /* ── Button row ── */
    .btn-row { display: flex; gap: 10px; margin-top: 18px; width: 100%; }
    .btn-row .glass-pill { flex: 1; }

    .glass-pill-sm {
      width: 100%; padding: 12px 18px; border-radius: 10px;
      font-size: 13px; color: rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 1px 0 rgba(255,255,255,0.10) inset, 0 3px 10px rgba(0,0,0,0.22);
      cursor: pointer; font-family: inherit; font-weight: 500;
      transition: background .2s, border-color .2s;
    }
    .glass-pill-sm:hover { background: rgba(255,255,255,0.09); border-color: rgba(0,229,204,0.25); }

    /* ── Status ── */
    .status { margin-top: 12px; padding: 11px 15px; border-radius: 12px; font-size: 13.5px; font-weight: 500; display: none; animation: pop .3s cubic-bezier(.34,1.56,.64,1); }
    .status.show { display: block; }
    .status.ok  { background: rgba(74,222,128,0.10); border: 1px solid rgba(74,222,128,0.25); color: #86efac; backdrop-filter: blur(20px); }
    .status.err { background: rgba(248,113,113,0.10); border: 1px solid rgba(248,113,113,0.25); color: #fca5a5; backdrop-filter: blur(20px); }

    /* ── File preview ── */
    .fp { display: none; align-items: center; gap: 12px; margin-top: 9px; padding: 10px 13px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10); }
    .fp.show { display: flex; }
    .fp img { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; }
    .fp-info { flex: 1; }
    .fp-name { font-size: 12.5px; font-weight: 600; color: rgba(255,255,255,0.72); margin-bottom: 1px; }
    .fp-size { font-size: 11px; color: rgba(255,255,255,0.32); }
    .fp-rm { color: rgba(255,255,255,0.25); cursor: pointer; font-size: 20px; padding: 4px 6px; border-radius: 6px; transition: color .2s; }
    .fp-rm:hover { color: #f87171; }

    /* ── List ── */
    .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 13px; padding: 0 4px; }
    .list-title { font-size: 11px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase; color: rgba(255,255,255,0.30); }
    .count-badge {
      font-size: 11.5px; font-weight: 600; color: rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(16px); padding: 2px 10px; border-radius: 50px;
    }

    .urls-list { display: flex; flex-direction: column; gap: 9px; }

    .url-card { padding: 16px 20px; display: flex; align-items: center; gap: 14px; animation: pop .4s cubic-bezier(.34,1.56,.64,1); }

    .icon-wrap { position: relative; width: 46px; height: 46px; flex-shrink: 0; }
    .icon-wrap::before {
      content: ''; position: absolute; inset: 0; border-radius: 13px;
      background: linear-gradient(140deg, rgba(255,255,255,0.30) 0%, transparent 55%);
      z-index: 2; pointer-events: none;
    }
    .icon-wrap img {
      width: 46px; height: 46px; border-radius: 13px;
      object-fit: contain; padding: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(16px); display: block;
    }

    .url-info { flex: 1; min-width: 0; }
    .url-title { font-size: 14.5px; font-weight: 600; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .url-link  { font-size: 12.5px; color: rgba(255,255,255,0.36); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .url-date  { font-size: 10.5px; color: rgba(255,255,255,0.22); }

    .btn-pin {
      flex-shrink: 0; padding: 7px 16px; border-radius: 50px;
      border: 1px solid rgba(251,191,36,0.22); cursor: pointer;
      font-family: inherit; font-size: 12.5px; font-weight: 700;
      color: rgba(255,255,255,0.65);
      background: rgba(251,191,36,0.07);
      backdrop-filter: blur(16px);
      box-shadow: 0 1px 0 rgba(255,255,255,0.10) inset, 0 4px 10px rgba(0,0,0,0.30);
      transition: all .22s cubic-bezier(.34,1.46,.64,1);
      margin-right: 6px;
    }
    .btn-pin:hover {
      background: rgba(251,191,36,0.14);
      border-color: rgba(251,191,36,0.38);
      box-shadow: 0 1px 0 rgba(255,255,255,0.12) inset, 0 5px 16px rgba(251,191,36,0.22);
      transform: scale(1.05);
    }
    .btn-pin.pinned { background: rgba(251,191,36,0.22); border-color: rgba(251,191,36,0.45); color: #fde68a; }

    .btn-rm {
      flex-shrink: 0; padding: 7px 16px; border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.12); cursor: pointer;
      font-family: inherit; font-size: 12.5px; font-weight: 700;
      color: rgba(255,255,255,0.80);
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(16px);
      box-shadow: 0 1px 0 rgba(255,255,255,0.10) inset, 0 4px 10px rgba(0,0,0,0.30);
      transition: all .22s cubic-bezier(.34,1.46,.64,1);
    }
    .btn-rm:hover {
      background: rgba(220,50,50,0.70);
      border-color: rgba(255,100,100,0.35);
      box-shadow: 0 1px 0 rgba(255,255,255,0.12) inset, 0 6px 16px rgba(180,0,0,0.35);
      transform: scale(1.05);
    }

    /* ── Empty state ── */
    .empty { padding: 52px 20px; text-align: center; }
    .empty-icon {
      width: 64px; height: 64px; margin: 0 auto 16px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.13);
      border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px;
      box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset; position: relative; overflow: hidden;
    }
    .empty-icon::before { content: ''; position: absolute; inset: 0; border-radius: 18px; background: linear-gradient(140deg, rgba(255,255,255,0.18) 0%, transparent 50%); }
    .empty-t { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.55); margin-bottom: 5px; }
    .empty-s { font-size: 12.5px; color: rgba(255,255,255,0.28); }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.18);
      border-top-color: rgba(255,255,255,0.80);
      border-radius: 50%; vertical-align: middle; margin-right: 8px;
      animation: spin .7s linear infinite;
    }

    @keyframes pop  { from{opacity:0;transform:translateY(10px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes spin { to{ transform: rotate(360deg); } }

    @media(max-width:600px){
      .publish-card{ padding: 20px 16px; }
      .url-card{ padding: 13px 14px; }
      .header h1{ letter-spacing: -1.2px; }
    }
  </style>
</head>
<body>

  <canvas id="ribbons"></canvas>

  <div class="page">
    <div class="container">

      <!-- Header -->
      <div class="header">
        <div class="badge">
          <span class="badge-dot" id="serverStatus"></span>
          <span style="position:relative;z-index:1">APP LAUNCH ON</span>
        </div>
        <h1>App <span>Launcher</span></h1>
        <p>Publish and manage your web apps</p>
      </div>

      <!-- Publish card -->
      <div class="glass-card publish-card">
        <div class="field">
          <span class="field-label">Custom Name (Optional)</span>
          <input class="glass-input" type="text" id="nameInput" placeholder="e.g., My Documents, Email, etc.">
        </div>
        <div class="field">
          <span class="field-label">Website URL</span>
          <input class="glass-input" type="text" id="urlInput" placeholder="https://youtube.com"
            onkeypress="if(event.key==='Enter') publishURL()">
        </div>

        <div class="adv-toggle" id="advToggle" onclick="toggleAdv()">
          <svg class="chevron" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="4,2 10,7 4,12"/></svg>
          Advanced Options
        </div>

        <div class="adv-section" id="advSection">
          <div class="field" style="margin-top:13px">
            <span class="field-label">Custom Icon URL</span>
            <input class="glass-input" type="text" id="iconInput" placeholder="https://example.com/icon.png">
          </div>
          <div class="divider"><span>or upload</span></div>
          <div class="field">
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile()">
            <button class="glass-pill-sm" onclick="document.getElementById('fileInput').click()" type="button">
              📁 &nbsp;<span id="fileLabel">Choose Image</span>
            </button>
            <div class="fp" id="fp"></div>
          </div>
        </div>

        <div class="btn-row">
          <button class="glass-pill" id="pubBtn" onclick="publishURL()">🚀&nbsp; Publish</button>
        </div>
        <div class="status" id="status"></div>
      </div>

      <!-- List -->
      <div id="listWrap"></div>

    </div>
  </div>

  <script>
    // ── Ribbon background ──
    const canvas = document.getElementById('ribbons');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const ribbons = [
      { color: [[0,200,150],[0,255,180]],   phase: 0,   speed: 0.007, amp: 80,  freq: 0.008, yBase: 0.50, thick: 55, alpha: 0.50 },
      { color: [[0,180,130],[20,240,160]],  phase: 1.2, speed: 0.009, amp: 55,  freq: 0.010, yBase: 0.58, thick: 30, alpha: 0.38 },
      { color: [[0,220,170],[0,200,140]],   phase: 2.5, speed: 0.006, amp: 90,  freq: 0.007, yBase: 0.42, thick: 20, alpha: 0.28 },
      { color: [[120,60,220],[180,80,255]], phase: 0.8, speed: 0.008, amp: 70,  freq: 0.009, yBase: 0.46, thick: 45, alpha: 0.48 },
      { color: [[100,40,200],[160,60,240]], phase: 2.0, speed: 0.010, amp: 50,  freq: 0.011, yBase: 0.55, thick: 25, alpha: 0.33 },
      { color: [[220,60,140],[255,80,160]], phase: 1.5, speed: 0.007, amp: 65,  freq: 0.009, yBase: 0.72, thick: 38, alpha: 0.42 },
      { color: [[200,40,120],[240,60,150]], phase: 3.0, speed: 0.009, amp: 42,  freq: 0.012, yBase: 0.78, thick: 18, alpha: 0.28 },
      { color: [[0,200,180],[0,240,200]],   phase: 0.4, speed: 0.011, amp: 38,  freq: 0.013, yBase: 0.35, thick: 14, alpha: 0.22 },
    ];

    let t = 0;

    function drawRibbon(r, W, H) {
      const points = [];
      for (let x = 0; x <= W; x += 4) {
        const y = r.yBase * H
          + Math.sin(x * r.freq + t * r.speed * 60 + r.phase) * r.amp
          + Math.sin(x * r.freq * 0.5 + t * r.speed * 40 + r.phase + 1) * (r.amp * 0.4);
        points.push([x, y]);
      }
      ctx.beginPath();
      ctx.moveTo(points[0][0], points[0][1] - r.thick / 2);
      for (let i = 1; i < points.length; i++) ctx.lineTo(points[i][0], points[i][1] - r.thick / 2);
      for (let i = points.length - 1; i >= 0; i--) ctx.lineTo(points[i][0], points[i][1] + r.thick / 2);
      ctx.closePath();

      const grd = ctx.createLinearGradient(0, 0, W, 0);
      const c1 = r.color[0], c2 = r.color[1];
      grd.addColorStop(0,   `rgba(${c1},0)`);
      grd.addColorStop(0.2, `rgba(${c1},${r.alpha})`);
      grd.addColorStop(0.5, `rgba(${c2},${r.alpha * 1.2})`);
      grd.addColorStop(0.8, `rgba(${c1},${r.alpha})`);
      grd.addColorStop(1,   `rgba(${c1},0)`);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    function animate(ts) {
      t = ts * 0.001;
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      ctx.save();
      ctx.filter = 'blur(14px)';
      ribbons.forEach(r => drawRibbon({ ...r, thick: r.thick * 2, alpha: r.alpha * 0.45 }, W, H));
      ctx.restore();

      ribbons.forEach(r => drawRibbon(r, W, H));
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    // ── App logic ──
    const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:3000'
      : 'https://app-launcher-u0x7.onrender.com';

    let busy = false, uploadedIcon = null;

    function keepServerAwake() {
      const dot = document.getElementById('serverStatus');
      if (dot) { dot.style.background = '#fbbf24'; dot.style.boxShadow = '0 0 8px #fbbf24'; }
      fetch(`${API}/health`)
        .then(() => { if (dot) { dot.style.background = '#4ade80'; dot.style.boxShadow = '0 0 8px #4ade80'; } })
        .catch(() => { if (dot) { dot.style.background = '#f87171'; dot.style.boxShadow = '0 0 8px #f87171'; } });
    }
    keepServerAwake();
    setInterval(keepServerAwake, 5 * 60 * 1000);

    function toggleAdv() {
      document.getElementById('advToggle').classList.toggle('open');
      document.getElementById('advSection').classList.toggle('open');
    }

    function handleFile() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) { toast('Select an image file', true); return; }
      if (file.size > 5e6) { toast('Image must be under 5MB', true); return; }
      const r = new FileReader();
      r.onload = e => {
        document.getElementById('fileLabel').textContent = 'Change Image';
        const fp = document.getElementById('fp');
        fp.innerHTML = `<img src="${e.target.result}"><div class="fp-info"><div class="fp-name">${file.name}</div><div class="fp-size">${(file.size/1024).toFixed(1)} KB</div></div><span class="fp-rm" onclick="clearFile()">×</span>`;
        fp.classList.add('show');
      };
      r.readAsDataURL(file);
      uploadFile(file);
    }

    async function uploadFile(file) {
      const fd = new FormData(); fd.append('icon', file);
      try {
        const r = await fetch(`${API}/upload-icon`, { method:'POST', body:fd });
        if (!r.ok) throw new Error(await r.text());
        uploadedIcon = (await r.json()).iconUrl;
        toast('✓ Image uploaded');
      } catch(e) { toast('Upload failed: ' + (e.message || 'Unknown error'), true); clearFile(); }
    }

    function clearFile() {
      document.getElementById('fileInput').value = '';
      document.getElementById('fp').classList.remove('show');
      document.getElementById('fileLabel').textContent = 'Choose Image';
      uploadedIcon = null;
    }

    function toast(msg, err=false) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `status show ${err?'err':'ok'}`;
      setTimeout(() => el.classList.remove('show'), 3200);
    }

    const fmt = d => new Date(d).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});

    async function fetchURLs() {
      const w = document.getElementById('listWrap');
      try {
        const urls = await (await fetch(`${API}/urls`)).json();
        if (!urls.length) {
          w.innerHTML = `<div class="glass-card empty"><div class="empty-icon">🌐</div><div class="empty-t">No apps published yet</div><div class="empty-s">Add your first URL above</div></div>`;
          return;
        }
        urls.sort((a, b) => {
          if (a.pinned && !b.pinned) return -1;
          if (!a.pinned && b.pinned) return 1;
          return new Date(b.publishedAt) - new Date(a.publishedAt);
        });
        const pinnedCount = urls.filter(u => u.pinned).length;
        w.innerHTML = `
          <div class="list-header">
            <span class="list-title">Published Apps</span>
            <span class="count-badge">${urls.length}</span>
          </div>
          <div class="urls-list">
            ${urls.map(u => {
              const domain = (() => { try { return new URL(u.url).hostname.replace('www.',''); } catch { return u.url; } })();
              const displayTitle = u.customName || u.title;
              return `
              <div class="glass-card url-card">
                <div class="icon-wrap">
                  <img src="${u.favicon}" alt="${displayTitle}"
                    onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22%3E%3Crect width=%2240%22 height=%2240%22 rx=%228%22 fill=%22rgba(255,255,255,.1)%22/%3E%3Ctext x=%2220%22 y=%2226%22 text-anchor=%22middle%22 font-size=%2218%22%3E🌐%3C/text%3E%3C/svg%3E'">
                </div>
                <div class="url-info">
                  <div class="url-title">${displayTitle}${u.pinned ? ' 📌' : ''}</div>
                  <div class="url-link">${domain}</div>
                  <div class="url-date">${fmt(u.publishedAt)}</div>
                </div>
                <button class="btn-pin ${u.pinned ? 'pinned' : ''}"
                  onclick="togglePin('${u.id}')"
                  ${!u.pinned && pinnedCount >= 5 ? 'disabled title="Maximum 5 pinned apps"' : ''}>
                  ${u.pinned ? '📌 Pinned' : 'Pin'}
                </button>
                <button class="btn-rm" onclick="deleteURL('${u.id}')">Remove</button>
              </div>`;
            }).join('')}
          </div>`;
      } catch {
        w.innerHTML = `<div class="glass-card empty"><div class="empty-icon">⚠️</div><div class="empty-t">Can't reach server</div><div class="empty-s">Make sure the backend is running</div></div>`;
      }
    }

    async function publishURL() {
      if (busy) return;
      const url = document.getElementById('urlInput').value.trim();
      const icon = document.getElementById('iconInput').value.trim();
      const customName = document.getElementById('nameInput').value.trim();
      if (!url) { toast('Please enter a URL', true); return; }
      try { new URL(url); } catch { toast('Enter a valid URL', true); return; }

      busy = true;
      const btn = document.getElementById('pubBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Publishing…';

      try {
        btn.innerHTML = '<span class="spinner"></span> Waking server…';
        await fetch(`${API}/health`).catch(()=>{});
        btn.innerHTML = '<span class="spinner"></span> Publishing…';
      } catch(e) {}

      const timeout = new Promise((_,rej) => setTimeout(() => rej(new Error('Timeout: Server took too long. Try again.')), 60000));

      try {
        const payload = { url };
        if (customName) payload.customName = customName;
        if (uploadedIcon) payload.customIcon = uploadedIcon;
        else if (icon) payload.customIcon = icon;

        const res = await Promise.race([
          fetch(`${API}/urls`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) }),
          timeout
        ]);
        if (!res.ok) {
          const errText = await res.text();
          let errMsg;
          try { const j = JSON.parse(errText); errMsg = res.status === 409 ? (j.message || 'URL already exists') : (j.error || 'Failed to publish'); }
          catch { errMsg = errText || 'Failed to publish'; }
          throw new Error(errMsg);
        }
        const entry = await res.json();
        document.getElementById('urlInput').value = '';
        document.getElementById('iconInput').value = '';
        document.getElementById('nameInput').value = '';
        clearFile();
        toast(`✓ Published: ${entry.customName || entry.title}`);
        fetchURLs();
      } catch(e) {
        toast(e.message || 'Failed to publish', true);
      } finally {
        busy = false; btn.disabled = false; btn.innerHTML = '🚀&nbsp; Publish';
      }
    }

    async function deleteURL(id) {
      try {
        if (!(await fetch(`${API}/urls/${id}`,{method:'DELETE'})).ok) throw 0;
        toast('✓ Removed'); fetchURLs();
      } catch { toast('Failed to remove', true); }
    }

    async function togglePin(id) {
      try {
        const res = await fetch(`${API}/urls/${id}/pin`, {method:'POST'});
        if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'Failed to pin'); }
        const result = await res.json();
        toast(result.pinned ? '📌 Pinned' : '✓ Unpinned');
        fetchURLs();
      } catch(e) { toast(e.message || 'Failed to toggle pin', true); }
    }

    fetchURLs();
  </script>
</body>
</html>
