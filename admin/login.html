<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — App Launcher</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      overflow: hidden;
    }

    body { background: #0c0c14; position: relative; min-height: 100vh; }

    /* ── Same gradient scene as launcher ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 65% 55% at 12% 18%,  #7c3aed 0%, transparent 58%),
        radial-gradient(ellipse 50% 60% at 85% 12%,  #0ea5e9 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 75% 82%,  #ec4899 0%, transparent 52%),
        radial-gradient(ellipse 45% 50% at 18% 80%,  #10b981 0%, transparent 50%),
        radial-gradient(ellipse 35% 35% at 50% 48%,  #f59e0b 0%, transparent 55%),
        #0c0c14;
    }

    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(72px); pointer-events: none; z-index: 0;
      mix-blend-mode: screen;
    }
    .o1 { width: 580px; height: 580px; background: #7c3aed; opacity: .55; top: -160px; left: -120px; animation: f1 26s ease-in-out infinite; }
    .o2 { width: 480px; height: 480px; background: #0ea5e9; opacity: .50; top: -40px; right: -80px; animation: f2 32s ease-in-out infinite; }
    .o3 { width: 420px; height: 420px; background: #ec4899; opacity: .50; bottom: -80px; right: 5%;  animation: f3 22s ease-in-out infinite; }
    .o4 { width: 380px; height: 380px; background: #10b981; opacity: .45; bottom: -60px; left: 8%;  animation: f4 28s ease-in-out infinite; }
    .o5 { width: 280px; height: 280px; background: #f59e0b; opacity: .40; top: 42%; left: 42%;      animation: f5 19s ease-in-out infinite; }

    @keyframes f1 { 0%,100%{transform:translate(0,0) scale(1)}   40%{transform:translate(70px,90px) scale(1.1)}  70%{transform:translate(-30px,40px) scale(.93)} }
    @keyframes f2 { 0%,100%{transform:translate(0,0) scale(1)}   35%{transform:translate(-80px,65px) scale(1.08)} 65%{transform:translate(40px,-35px) scale(.92)} }
    @keyframes f3 { 0%,100%{transform:translate(0,0) scale(1)}   50%{transform:translate(50px,-70px) scale(1.12)} }
    @keyframes f4 { 0%,100%{transform:translate(0,0) scale(1)}   45%{transform:translate(-45px,50px) scale(1.07)} }
    @keyframes f5 { 0%,100%{transform:translate(0,0) scale(1)}   50%{transform:translate(30px,-35px) scale(1.09)} }

    /* ── Page layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 20px; border-radius: 50px; margin-bottom: 28px;
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(24px) saturate(2);
      -webkit-backdrop-filter: blur(24px) saturate(2);
      border: 1px solid rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.72);
      font-size: 12px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase;
      box-shadow: 0 1px 0 rgba(255,255,255,0.40) inset;
      position: relative; overflow: hidden;
    }
    .badge::before {
      content: '';
      position: absolute; inset: 0; border-radius: 50px;
      background: linear-gradient(135deg, rgba(255,255,255,0.30) 0%, transparent 45%);
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px #4ade80; flex-shrink: 0; position: relative; z-index: 1; }
    .badge span { position: relative; z-index: 1; }

    /* ── Login card ── */
    .card {
      width: 100%; max-width: 420px;
      position: relative;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(40px) saturate(2.2) brightness(1.1);
      -webkit-backdrop-filter: blur(40px) saturate(2.2) brightness(1.1);
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.20);
      box-shadow:
        0 1.5px 0 rgba(255,255,255,0.55) inset,
        0 -1px  0 rgba(255,255,255,0.10) inset,
        0 20px 60px rgba(0,0,0,0.40),
        0  4px 16px rgba(0,0,0,0.25);
      overflow: hidden;
      padding: 40px 36px 36px;
      animation: popIn .6s cubic-bezier(.34,1.46,.64,1);
    }
    .card::before {
      content: '';
      position: absolute; inset: 0; border-radius: inherit; z-index: 0; pointer-events: none;
      background: linear-gradient(148deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.18) 14%, rgba(255,255,255,0.02) 35%, transparent 55%);
    }
    .card::after {
      content: '';
      position: absolute; inset: 0; border-radius: inherit; z-index: 0; pointer-events: none;
      background: linear-gradient(to bottom, transparent 65%, rgba(255,255,255,0.06) 82%, rgba(255,255,255,0.18) 100%);
    }
    .card > * { position: relative; z-index: 1; }

    /* ── Card header ── */
    .card-icon {
      width: 64px; height: 64px;
      margin: 0 auto 20px;
      border-radius: 20px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.22);
      backdrop-filter: blur(20px);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      box-shadow: 0 1.5px 0 rgba(255,255,255,0.50) inset, 0 8px 24px rgba(0,0,0,0.30);
      position: relative; overflow: hidden;
    }
    .card-icon::before {
      content: ''; position: absolute; inset: 0; border-radius: 20px;
      background: linear-gradient(140deg, rgba(255,255,255,0.45) 0%, transparent 55%);
    }

    .card-title {
      text-align: center;
      font-size: 1.75rem; font-weight: 700;
      color: rgba(255,255,255,0.94);
      letter-spacing: -1px; margin-bottom: 6px;
    }
    .card-sub {
      text-align: center;
      font-size: 14px; color: rgba(255,255,255,0.42);
      margin-bottom: 32px;
    }

    /* ── Fields ── */
    .field { margin-bottom: 14px; }

    .field-label {
      display: block; font-size: 11px; font-weight: 700;
      letter-spacing: .7px; text-transform: uppercase;
      color: rgba(255,255,255,0.38); margin-bottom: 8px;
    }

    /* Input wrapper for icon */
    .input-wrap { position: relative; }

    .input-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      font-size: 16px; opacity: .45; pointer-events: none;
    }

    .glass-input {
      width: 100%;
      padding: 15px 18px 15px 44px;
      border-radius: 18px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(30px) saturate(2);
      -webkit-backdrop-filter: blur(30px) saturate(2);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.90);
      font-family: inherit; font-size: 15px;
      outline: none;
      transition: all .25s ease;
      box-shadow: 0 1px 0 rgba(255,255,255,0.28) inset, 0 4px 14px rgba(0,0,0,0.18);
    }
    .glass-input::placeholder { color: rgba(255,255,255,0.28); }
    .glass-input:focus {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.35);
      box-shadow: 0 1px 0 rgba(255,255,255,0.40) inset, 0 6px 24px rgba(0,0,0,0.28), 0 0 0 3px rgba(255,255,255,0.06);
    }
    .glass-input.err {
      border-color: rgba(248,113,113,0.55);
      background: rgba(248,113,113,0.08);
    }

    /* Password toggle */
    .pw-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 16px; opacity: .45; transition: opacity .2s; padding: 4px;
    }
    .pw-toggle:hover { opacity: .80; }

    /* ── Error message ── */
    .error-msg {
      display: none; align-items: center; gap: 8px;
      margin-top: 14px; padding: 12px 16px; border-radius: 14px;
      background: rgba(248,113,113,0.12);
      border: 1px solid rgba(248,113,113,0.28);
      color: #fca5a5; font-size: 13px; font-weight: 500;
      backdrop-filter: blur(20px);
      animation: shake .4s cubic-bezier(.36,.07,.19,.97);
    }
    .error-msg.show { display: flex; }

    /* ── Login button ── */
    .login-btn {
      width: 100%; margin-top: 22px;
      padding: 16px 28px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.28);
      cursor: pointer; outline: none;
      font-family: inherit; font-size: 15px; font-weight: 600;
      color: rgba(255,255,255,0.92);
      letter-spacing: -.1px;
      overflow: hidden; position: relative;
      background: linear-gradient(
        155deg,
        rgba(255,255,255,0.38) 0%,
        rgba(255,255,255,0.16) 22%,
        rgba(255,255,255,0.06) 50%,
        rgba(255,255,255,0.04) 68%,
        rgba(255,255,255,0.12) 85%,
        rgba(255,255,255,0.22) 100%
      );
      backdrop-filter: blur(36px) saturate(2.4) brightness(1.15);
      -webkit-backdrop-filter: blur(36px) saturate(2.4) brightness(1.15);
      box-shadow:
        0 1.5px 0 rgba(255,255,255,0.65) inset,
        0 -1px  0 rgba(255,255,255,0.18) inset,
        0 10px 30px rgba(0,0,0,0.40),
        0  3px  8px rgba(0,0,0,0.28);
      transition: all .3s cubic-bezier(.34,1.46,.64,1);
    }
    .login-btn::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 46%;
      border-radius: 50px 50px 0 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.28) 0%, transparent 100%);
      pointer-events: none;
    }
    .login-btn:hover:not(:disabled) {
      border-color: rgba(255,255,255,0.42);
      box-shadow:
        0 1.5px 0 rgba(255,255,255,0.80) inset,
        0 -1px  0 rgba(255,255,255,0.22) inset,
        0 18px 50px rgba(0,0,0,0.55),
        0  5px 16px rgba(0,0,0,0.35);
      transform: translateY(-2px) scale(1.01);
    }
    .login-btn:active:not(:disabled) { transform: scale(.98); }
    .login-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    /* Loading spinner inside button */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: rgba(255,255,255,0.90);
      border-radius: 50%; vertical-align: middle; margin-right: 8px;
      animation: spin .7s linear infinite;
    }

    /* ── Footer hint ── */
    .hint {
      text-align: center; margin-top: 22px;
      font-size: 12px; color: rgba(255,255,255,0.25);
    }

    /* ── Animations ── */
    @keyframes popIn { from{opacity:0;transform:translateY(24px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes spin  { to{ transform: rotate(360deg); } }
    @keyframes shake {
      10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)}
      30%,50%,70%{transform:translateX(-4px)} 40%,60%{transform:translateX(4px)}
    }

    @media(max-width:480px){
      .card{ padding: 32px 22px 28px; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <div class="orb o4"></div>
  <div class="orb o5"></div>

  <div class="page">

    <div class="badge">
      <span class="badge-dot"></span>
      <span>App Launcher</span>
    </div>

    <div class="card">

      <div class="card-icon">🚀</div>
      <div class="card-title">Welcome back</div>
      <div class="card-sub">Sign in to manage your apps</div>

      <div class="field">
        <label class="field-label" for="username">Username</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input class="glass-input" type="text" id="username" placeholder="Enter username" autocomplete="username" onkeypress="if(event.key==='Enter') tryLogin()">
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input class="glass-input" type="password" id="password" placeholder="Enter password" autocomplete="current-password" onkeypress="if(event.key==='Enter') tryLogin()">
          <button class="pw-toggle" type="button" onclick="togglePw()" id="pwToggle" title="Show/hide password">👁️</button>
        </div>
      </div>

      <div class="error-msg" id="errMsg">
        ⚠️ <span id="errText">Invalid username or password</span>
      </div>

      <button class="login-btn" id="loginBtn" onclick="tryLogin()">
        <span id="btnContent">Sign In</span>
      </button>

      <div class="hint">Hint: haha It's Secure</div>

    </div>

  </div>

  <script>
    function togglePw() {
      const inp = document.getElementById('password');
      const btn = document.getElementById('pwToggle');
      if (inp.type === 'password') {
        inp.type = 'text';
        btn.textContent = '🙈';
      } else {
        inp.type = 'password';
        btn.textContent = '👁️';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errMsg');
      document.getElementById('errText').textContent = msg;
      el.classList.add('show');
      document.getElementById('username').classList.add('err');
      document.getElementById('password').classList.add('err');
      // re-trigger shake animation
      el.style.animation = 'none';
      el.offsetHeight; // reflow
      el.style.animation = '';
    }

    function clearError() {
      document.getElementById('errMsg').classList.remove('show');
      document.getElementById('username').classList.remove('err');
      document.getElementById('password').classList.remove('err');
    }

    async function tryLogin() {
      const btn = document.getElementById('loginBtn');
      const content = document.getElementById('btnContent');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      clearError();

      if (!username || !password) {
        showError('Please fill in both fields');
        return;
      }

      // Show loading state
      btn.disabled = true;
      content.innerHTML = '<span class="spinner"></span>Signing in…';

      // Simulate a tiny delay for realism
      await new Promise(r => setTimeout(r, 800));

      if (username === 'Admin' && password === 'Admin@123') {
        // Success — flash green then redirect
        content.innerHTML = '✓ Success!';
        btn.style.background = 'linear-gradient(155deg, rgba(74,222,128,0.45) 0%, rgba(74,222,128,0.18) 50%, rgba(74,222,128,0.30) 100%)';
        btn.style.borderColor = 'rgba(74,222,128,0.50)';
        btn.style.boxShadow = '0 1.5px 0 rgba(255,255,255,0.65) inset, 0 10px 40px rgba(74,222,128,0.30)';
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 600);
      } else {
        // Wrong creds
        btn.disabled = false;
        content.innerHTML = 'Sign In';
        if (username !== 'Admin') {
          showError('Username not found');
        } else {
          showError('Incorrect password');
        }
      }
    }

    // Auto-focus username
    document.getElementById('username').focus();
  </script>

</body>
</html>
