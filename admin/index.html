<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AppLauncher Login</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; width: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
  }
  body {
    background: #000;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }

  .scene {
    position: relative;
    width: 420px; height: 520px;
    display: flex; align-items: center; justify-content: center;
  }

  canvas#ribbons {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  .card {
    position: relative; z-index: 2;
    width: 300px;
    background: rgba(40, 44, 48, 0.55);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.13);
    box-shadow:
      0 1px 0 0 rgba(255,255,255,0.18) inset,
      0 32px 64px rgba(0,0,0,0.60),
      0 8px 24px rgba(0,0,0,0.40);
    padding: 32px 28px 24px;
  }

  .heading {
    text-align: center;
    margin-bottom: 22px;
    line-height: 1.2;
  }
  .heading .line1 {
    font-size: 22px; font-weight: 800; letter-spacing: 1px;
    color: #fff;
  }
  .heading .line1 span { color: #00e5cc; }
  .heading .line2 {
    font-size: 18px; font-weight: 400; letter-spacing: 3px;
    color: rgba(255,255,255,0.85);
    margin-top: 2px;
  }

  .login-label {
    font-size: 13px; font-weight: 700; letter-spacing: 1.5px;
    color: rgba(255,255,255,0.80);
    margin-bottom: 12px;
  }

  .input-wrap {
    position: relative; margin-bottom: 12px;
  }
  .glass-input {
    width: 100%;
    padding: 13px 44px 13px 16px;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    box-shadow: 0 1px 0 0 rgba(255,255,255,0.10) inset;
    color: rgba(255,255,255,0.85);
    font-family: inherit; font-size: 14px;
    outline: none;
    transition: background .2s, border-color .2s;
  }
  .glass-input::placeholder { color: rgba(255,255,255,0.45); font-size: 14px; }
  .glass-input:focus {
    background: rgba(255,255,255,0.13);
    border-color: rgba(0,229,204,0.40);
  }
  .input-icon {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    font-size: 15px; opacity: .55; pointer-events: none;
  }

  .btn-wrap {
    display: flex; justify-content: center;
    margin: 18px 0 16px;
  }
  .login-btn {
    padding: 10px 42px;
    border-radius: 8px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.22);
    box-shadow:
      0 1px 0 0 rgba(255,255,255,0.30) inset,
      0 4px 16px rgba(0,0,0,0.30);
    color: rgba(255,255,255,0.90);
    font-family: inherit; font-size: 13px; font-weight: 700;
    letter-spacing: 1.5px; cursor: pointer;
    transition: all .25s ease;
    position: relative; overflow: hidden;
  }
  .login-btn::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 50%;
    border-radius: 8px 8px 0 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 100%);
    pointer-events: none;
  }
  .login-btn:hover {
    background: rgba(255,255,255,0.20);
    border-color: rgba(0,229,204,0.45);
    transform: translateY(-1px);
    box-shadow:
      0 1px 0 0 rgba(255,255,255,0.35) inset,
      0 8px 24px rgba(0,0,0,0.40);
  }
  .login-btn:active { transform: scale(.97); }

  .footer-links {
    display: flex; justify-content: space-between;
    margin-top: 4px;
  }
  .footer-links a {
    font-size: 11.5px; color: rgba(255,255,255,0.45);
    text-decoration: none; cursor: pointer;
    transition: color .2s;
  }
  .footer-links a:hover { color: rgba(0,229,204,0.80); }

  .spinner {
    display: inline-block; width: 13px; height: 13px;
    border: 2px solid rgba(255,255,255,0.20);
    border-top-color: rgba(255,255,255,0.80);
    border-radius: 50%; vertical-align: middle; margin-right: 7px;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to{ transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="scene">
  <canvas id="ribbons"></canvas>

  <div class="card">
    <div class="heading">
      <div class="line1">App<span>Launcher</span></div>
      <div class="line2">Welcomes</div>
    </div>

    <div class="login-label">LOGIN</div>

    <div class="input-wrap">
      <input class="glass-input" type="text" id="username" placeholder="Username" onkeypress="if(event.key==='Enter')tryLogin()">
      <span class="input-icon">👤</span>
    </div>

    <div class="input-wrap">
      <input class="glass-input" type="password" id="password" placeholder="••••••••••" onkeypress="if(event.key==='Enter')tryLogin()">
      <span class="input-icon">🔒</span>
    </div>

    <div class="btn-wrap">
      <button class="login-btn" id="loginBtn" onclick="tryLogin()">
        <span id="btnText">LOGIN</span>
      </button>
    </div>

    <div class="footer-links">
      <a>Remember me</a>
      <a>Forgot password?</a>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('ribbons');
const ctx = canvas.getContext('2d');
const W = 420, H = 520;
canvas.width = W; canvas.height = H;

const ribbons = [
  { color: [[0,200,150],[0,255,180]],   phase: 0,   speed: 0.007, amp: 55, freq: 0.012, yBase: 0.52, thick: 38, alpha: 0.55 },
  { color: [[0,180,130],[20,240,160]],  phase: 1.2, speed: 0.009, amp: 40, freq: 0.014, yBase: 0.58, thick: 22, alpha: 0.40 },
  { color: [[0,220,170],[0,200,140]],   phase: 2.5, speed: 0.006, amp: 65, freq: 0.010, yBase: 0.45, thick: 15, alpha: 0.30 },
  { color: [[120,60,220],[180,80,255]], phase: 0.8, speed: 0.008, amp: 50, freq: 0.011, yBase: 0.48, thick: 30, alpha: 0.50 },
  { color: [[100,40,200],[160,60,240]], phase: 2.0, speed: 0.010, amp: 35, freq: 0.013, yBase: 0.55, thick: 18, alpha: 0.35 },
  { color: [[220,60,140],[255,80,160]], phase: 1.5, speed: 0.007, amp: 45, freq: 0.012, yBase: 0.72, thick: 25, alpha: 0.45 },
  { color: [[200,40,120],[240,60,150]], phase: 3.0, speed: 0.009, amp: 30, freq: 0.015, yBase: 0.78, thick: 14, alpha: 0.30 },
  { color: [[0,200,180],[0,240,200]],   phase: 0.4, speed: 0.011, amp: 28, freq: 0.016, yBase: 0.38, thick: 10, alpha: 0.25 },
];

let t = 0;

function drawRibbon(r) {
  const points = [];
  for (let x = 0; x <= W; x += 3) {
    const y = r.yBase * H
      + Math.sin(x * r.freq + t * r.speed * 60 + r.phase) * r.amp
      + Math.sin(x * r.freq * 0.5 + t * r.speed * 40 + r.phase + 1) * (r.amp * 0.4);
    points.push([x, y]);
  }

  ctx.beginPath();
  ctx.moveTo(points[0][0], points[0][1] - r.thick / 2);
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i][0], points[i][1] - r.thick / 2);
  }
  for (let i = points.length - 1; i >= 0; i--) {
    ctx.lineTo(points[i][0], points[i][1] + r.thick / 2);
  }
  ctx.closePath();

  const grd = ctx.createLinearGradient(0, 0, W, 0);
  const c1 = r.color[0], c2 = r.color[1];
  grd.addColorStop(0,   `rgba(${c1[0]},${c1[1]},${c1[2]},0)`);
  grd.addColorStop(0.2, `rgba(${c1[0]},${c1[1]},${c1[2]},${r.alpha})`);
  grd.addColorStop(0.5, `rgba(${c2[0]},${c2[1]},${c2[2]},${r.alpha * 1.2})`);
  grd.addColorStop(0.8, `rgba(${c1[0]},${c1[1]},${c1[2]},${r.alpha})`);
  grd.addColorStop(1,   `rgba(${c1[0]},${c1[1]},${c1[2]},0)`);

  ctx.fillStyle = grd;
  ctx.fill();
}

function animate(ts) {
  t = ts * 0.001;
  ctx.clearRect(0, 0, W, H);

  ctx.save();
  ctx.filter = 'blur(12px)';
  ribbons.forEach(r => drawRibbon({ ...r, thick: r.thick * 1.8, alpha: r.alpha * 0.5 }));
  ctx.restore();

  ribbons.forEach(r => drawRibbon(r));
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

async function tryLogin() {
  const btn = document.getElementById('loginBtn');
  const txt = document.getElementById('btnText');
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  if (!u || !p) {
    btn.style.borderColor = 'rgba(255,80,80,0.5)';
    setTimeout(() => btn.style.borderColor = '', 800);
    return;
  }
  btn.disabled = true;
  txt.innerHTML = '<span class="spinner"></span>';
  await new Promise(r => setTimeout(r, 900));
  if (u === 'Admin' && p === 'Admin@123') {
    txt.textContent = '✓';
    btn.style.borderColor = 'rgba(0,229,180,0.6)';
    btn.style.color = '#00e5cc';
    setTimeout(() => { window.location.href = './admin.html'; }, 700);
  } else {
    btn.disabled = false;
    txt.textContent = 'LOGIN';
    btn.style.borderColor = 'rgba(255,80,80,0.5)';
    setTimeout(() => btn.style.borderColor = '', 1000);
  }
}
</script>
</body>
</html>
