<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — App Launcher</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      overflow: hidden;
    }

    body { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      position: relative; 
      min-height: 100vh; 
    }

    /* Liquid glass background */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 70% at 15% 20%,  rgba(147, 197, 253, 0.4) 0%, transparent 55%),
        radial-gradient(ellipse 70% 60% at 85% 15%,  rgba(196, 181, 253, 0.35) 0%, transparent 50%),
        radial-gradient(ellipse 65% 55% at 75% 85%,  rgba(165, 243, 252, 0.3) 0%, transparent 48%),
        radial-gradient(ellipse 50% 50% at 25% 80%,  rgba(199, 210, 254, 0.35) 0%, transparent 52%),
        linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    /* Animated soft orbs */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(90px); pointer-events: none; z-index: 0;
      mix-blend-mode: overlay;
    }
    .o1 { width: 500px; height: 500px; background: rgba(147, 197, 253, 0.5); top: -180px; left: -140px; animation: f1 28s ease-in-out infinite; }
    .o2 { width: 420px; height: 420px; background: rgba(196, 181, 253, 0.45); top: -60px; right: -100px; animation: f2 34s ease-in-out infinite; }
    .o3 { width: 380px; height: 380px; background: rgba(165, 243, 252, 0.4); bottom: -100px; right: 8%;  animation: f3 24s ease-in-out infinite; }
    .o4 { width: 350px; height: 350px; background: rgba(199, 210, 254, 0.4); bottom: -80px; left: 10%;  animation: f4 30s ease-in-out infinite; }

    @keyframes f1 { 0%,100%{transform:translate(0,0) scale(1)}   45%{transform:translate(60px,80px) scale(1.08)}  75%{transform:translate(-25px,35px) scale(.95)} }
    @keyframes f2 { 0%,100%{transform:translate(0,0) scale(1)}   40%{transform:translate(-70px,55px) scale(1.06)} 70%{transform:translate(35px,-30px) scale(.94)} }
    @keyframes f3 { 0%,100%{transform:translate(0,0) scale(1)}   50%{transform:translate(45px,-60px) scale(1.10)} }
    @keyframes f4 { 0%,100%{transform:translate(0,0) scale(1)}   48%{transform:translate(-40px,45px) scale(1.05)} }

    /* Page layout */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
    }

    /* Badge */
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 22px; border-radius: 50px; margin-bottom: 32px;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(30px) saturate(1.8);
      -webkit-backdrop-filter: blur(30px) saturate(1.8);
      border: 1px solid rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.95);
      font-size: 13px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase;
      box-shadow: 
        0 2px 0 rgba(255,255,255,0.5) inset,
        0 8px 32px rgba(0,0,0,0.1);
      position: relative; overflow: hidden;
    }
    .badge::before {
      content: '';
      position: absolute; inset: 0; border-radius: 50px;
      background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 50%);
    }
    .badge-dot { 
      width: 7px; height: 7px; border-radius: 50%; 
      background: linear-gradient(135deg, #60a5fa, #3b82f6); 
      box-shadow: 0 0 12px rgba(96, 165, 250, 0.8); 
      flex-shrink: 0; position: relative; z-index: 1; 
    }
    .badge span { position: relative; z-index: 1; }

    /* Login card */
    .card {
      width: 100%; max-width: 440px;
      position: relative;
      background: rgba(255,255,255,0.20);
      backdrop-filter: blur(60px) saturate(1.5) brightness(1.15);
      -webkit-backdrop-filter: blur(60px) saturate(1.5) brightness(1.15);
      border-radius: 32px;
      border: 1.5px solid rgba(255,255,255,0.35);
      box-shadow:
        0 2.5px 0 rgba(255,255,255,0.7) inset,
        0 -1.5px 0 rgba(255,255,255,0.2) inset,
        0 30px 90px rgba(0,0,0,0.15),
        0  8px 24px rgba(0,0,0,0.1);
      overflow: hidden;
      padding: 48px 40px 40px;
      animation: popIn .7s cubic-bezier(.34,1.56,.64,1);
    }
    .card::before {
      content: '';
      position: absolute; inset: 0; border-radius: inherit; z-index: 0; pointer-events: none;
      background: linear-gradient(145deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
    }
    .card::after {
      content: '';
      position: absolute; inset: 0; border-radius: inherit; z-index: 0; pointer-events: none;
      background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.3) 0%, transparent 50%);
    }
    .card > * { position: relative; z-index: 1; }

    /* Card icon */
    .card-icon {
      width: 72px; height: 72px;
      margin: 0 auto 24px;
      border-radius: 22px;
      background: rgba(255,255,255,0.25);
      border: 1.5px solid rgba(255,255,255,0.45);
      backdrop-filter: blur(30px);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px;
      box-shadow: 
        0 2px 0 rgba(255,255,255,0.6) inset, 
        0 12px 32px rgba(0,0,0,0.1);
      position: relative; overflow: hidden;
    }
    .card-icon::before {
      content: ''; position: absolute; inset: 0; border-radius: 22px;
      background: linear-gradient(135deg, rgba(255,255,255,0.5) 0%, transparent 60%);
    }

    .card-title {
      text-align: center;
      font-size: 2rem; font-weight: 800;
      color: rgba(255,255,255,0.98);
      letter-spacing: -1.2px; margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .card-sub {
      text-align: center;
      font-size: 15px; color: rgba(255,255,255,0.75);
      margin-bottom: 36px; font-weight: 500;
    }

    /* Fields */
    .field { margin-bottom: 18px; }

    .field-label {
      display: block; font-size: 12px; font-weight: 700;
      letter-spacing: .8px; text-transform: uppercase;
      color: rgba(255,255,255,0.70); margin-bottom: 10px;
    }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
      font-size: 18px; opacity: .6; pointer-events: none;
    }

    .glass-input {
      width: 100%;
      padding: 17px 20px 17px 50px;
      border-radius: 20px;
      background: rgba(255,255,255,0.20);
      backdrop-filter: blur(40px) saturate(1.6);
      -webkit-backdrop-filter: blur(40px) saturate(1.6);
      border: 1.5px solid rgba(255,255,255,0.35);
      color: rgba(255,255,255,0.98);
      font-family: inherit; font-size: 16px; font-weight: 500;
      outline: none;
      transition: all .3s ease;
      box-shadow: 
        0 1.5px 0 rgba(255,255,255,0.4) inset, 
        0 6px 20px rgba(0,0,0,0.08);
    }
    .glass-input::placeholder { color: rgba(255,255,255,0.45); }
    .glass-input:focus {
      background: rgba(255,255,255,0.30);
      border-color: rgba(255,255,255,0.55);
      box-shadow: 
        0 2px 0 rgba(255,255,255,0.5) inset, 
        0 8px 32px rgba(0,0,0,0.12), 
        0 0 0 4px rgba(255,255,255,0.15);
    }
    .glass-input.err {
      border-color: rgba(248,113,113,0.7);
      background: rgba(248,113,113,0.15);
    }

    /* Password toggle */
    .pw-toggle {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 18px; opacity: .55; transition: opacity .2s; padding: 6px;
    }
    .pw-toggle:hover { opacity: .85; }

    /* Error message */
    .error-msg {
      display: none; align-items: center; gap: 10px;
      margin-top: 18px; padding: 14px 18px; border-radius: 16px;
      background: rgba(248,113,113,0.20);
      border: 1.5px solid rgba(248,113,113,0.4);
      color: #fff; font-size: 14px; font-weight: 600;
      backdrop-filter: blur(30px);
      animation: shake .4s cubic-bezier(.36,.07,.19,.97);
    }
    .error-msg.show { display: flex; }

    /* Login button - Liquid Glass Button */
    .glass-button-wrap {
      width: 100%; margin-top: 28px;
      position: relative;
      cursor: pointer;
    }
    .glass-button {
      width: 100%;
      padding: 18px 32px;
      border-radius: 50px;
      border: 1.5px solid rgba(255,255,255,0.45);
      cursor: pointer; outline: none;
      font-family: inherit; font-size: 16px; font-weight: 700;
      color: rgba(255,255,255,0.98);
      letter-spacing: -.2px;
      overflow: hidden; position: relative;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.25) 50%,
        rgba(255,255,255,0.35) 100%
      );
      backdrop-filter: blur(50px) saturate(1.8) brightness(1.2);
      -webkit-backdrop-filter: blur(50px) saturate(1.8) brightness(1.2);
      box-shadow:
        0 2.5px 0 rgba(255,255,255,0.8) inset,
        0 -1.5px 0 rgba(255,255,255,0.3) inset,
        0 14px 40px rgba(0,0,0,0.15),
        0  4px 12px rgba(0,0,0,0.1);
      transition: all .35s cubic-bezier(.34,1.56,.64,1);
    }
    .glass-button::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 50%;
      border-radius: 50px 50px 0 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.4) 0%, transparent 100%);
      pointer-events: none;
    }
    .glass-button-shadow {
      position: absolute;
      inset: -2px;
      border-radius: 50px;
      background: linear-gradient(135deg, rgba(147, 197, 253, 0.3), rgba(196, 181, 253, 0.3));
      filter: blur(20px);
      opacity: 0;
      transition: opacity .35s ease;
      z-index: -1;
    }
    .glass-button-wrap:hover .glass-button:not(:disabled) {
      border-color: rgba(255,255,255,0.6);
      box-shadow:
        0 3px 0 rgba(255,255,255,0.9) inset,
        0 -2px 0 rgba(255,255,255,0.4) inset,
        0 24px 70px rgba(0,0,0,0.2),
        0  8px 20px rgba(0,0,0,0.15);
      transform: translateY(-3px) scale(1.02);
    }
    .glass-button-wrap:hover .glass-button-shadow {
      opacity: 1;
    }
    .glass-button:active:not(:disabled) { transform: scale(.98); }
    .glass-button:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* Loading spinner */
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: rgba(255,255,255,0.95);
      border-radius: 50%; vertical-align: middle; margin-right: 10px;
      animation: spin .7s linear infinite;
    }

    /* Footer hint */
    .hint {
      text-align: center; margin-top: 24px;
      font-size: 13px; color: rgba(255,255,255,0.50); font-weight: 500;
    }

    /* Animations */
    @keyframes popIn { from{opacity:0;transform:translateY(28px) scale(.93)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes spin  { to{ transform: rotate(360deg); } }
    @keyframes shake {
      10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)}
      30%,50%,70%{transform:translateX(-4px)} 40%,60%{transform:translateX(4px)}
    }

    @media(max-width:480px){
      .card{ padding: 36px 26px 32px; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <div class="orb o4"></div>

  <div class="page">

    <div class="badge">
      <span class="badge-dot"></span>
      <span>App Launcher</span>
    </div>

    <div class="card">

      <div class="card-icon">🚀</div>
      <div class="card-title">Welcome back</div>
      <div class="card-sub">Sign in to manage your apps</div>

      <div class="field">
        <label class="field-label" for="username">Username</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input class="glass-input" type="text" id="username" placeholder="Enter username" autocomplete="username" onkeypress="if(event.key==='Enter') tryLogin()">
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input class="glass-input" type="password" id="password" placeholder="Enter password" autocomplete="current-password" onkeypress="if(event.key==='Enter') tryLogin()">
          <button class="pw-toggle" type="button" onclick="togglePw()" id="pwToggle" title="Show/hide password">👁️</button>
        </div>
      </div>

      <div class="error-msg" id="errMsg">
        ⚠️ <span id="errText">Invalid username or password</span>
      </div>

      <div class="glass-button-wrap">
        <button class="glass-button" id="loginBtn" onclick="tryLogin()">
          <span id="btnContent">Sign In</span>
        </button>
        <div class="glass-button-shadow"></div>
      </div>

      <div class="hint">Hint: It's Secure 🔐</div>

    </div>

  </div>

  <script>
    function togglePw() {
      const inp = document.getElementById('password');
      const btn = document.getElementById('pwToggle');
      if (inp.type === 'password') {
        inp.type = 'text';
        btn.textContent = '🙈';
      } else {
        inp.type = 'password';
        btn.textContent = '👁️';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errMsg');
      document.getElementById('errText').textContent = msg;
      el.classList.add('show');
      document.getElementById('username').classList.add('err');
      document.getElementById('password').classList.add('err');
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = '';
    }

    function clearError() {
      document.getElementById('errMsg').classList.remove('show');
      document.getElementById('username').classList.remove('err');
      document.getElementById('password').classList.remove('err');
    }

    async function tryLogin() {
      const btn = document.getElementById('loginBtn');
      const content = document.getElementById('btnContent');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      clearError();

      if (!username || !password) {
        showError('Please fill in both fields');
        return;
      }

      btn.disabled = true;
      content.innerHTML = '<span class="spinner"></span>Signing in…';

      await new Promise(r => setTimeout(r, 800));

      if (username === 'Admin' && password === 'Admin@123') {
        content.innerHTML = '✓ Success!';
        btn.style.background = 'linear-gradient(135deg, rgba(74,222,128,0.5) 0%, rgba(74,222,128,0.3) 100%)';
        btn.style.borderColor = 'rgba(74,222,128,0.6)';
        
        setTimeout(() => {
          window.location.href = './admin.html';
        }, 600);
      } else {
        btn.disabled = false;
        content.innerHTML = 'Sign In';
        if (username !== 'Admin') {
          showError('Username not found');
        } else {
          showError('Incorrect password');
        }
      }
    }

    document.getElementById('username').focus();
  </script>

</body>
</html>
